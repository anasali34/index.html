<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nur Phone Ultimate POS</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#111827;color:#fff;padding:12px;text-align:center}
.card{background:#fff;margin:10px;padding:12px;border-radius:10px}
input,select,button{width:100%;padding:8px;margin:4px 0;box-sizing:border-box}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px}
.hidden{display:none}
</style>
</head>
<body>
<header><h2>Nur Phone Ultimate POS</h2></header>

<div class="card" id="loginBox">
<h3>Login</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
<div class="card" id="adminBox">
<h3>USD / IQD Settings (Admin)</h3>
<input id="rate" type="number" value="1450">
<button onclick="saveRate()">Save Rate</button>
</div>

<div class="card">
<h3>Add Product</h3>
<input id="name" placeholder="Product">
<input id="buy" type="number" placeholder="Buy Price USD">
<input id="sell" type="number" placeholder="Sell Price USD">
<input id="qty" type="number" placeholder="Qty">
<button onclick="addProduct()">Save</button>
</div>

<div class="card">
<h3>Sell Product</h3>
<input id="sellName" placeholder="Product Name">
<input id="sellQty" type="number" placeholder="Qty">
<select id="currency"><option>USD</option><option>IQD</option></select>
<button onclick="sellProduct()">Sell</button>
<div id="receipt"></div>
</div>

<div class="card">
<h3>Dashboard</h3>
<p id="sales"></p>
<p id="profit"></p>
</div>

<div class="card">
<h3>Inventory</h3>
<table>
<thead><tr><th>Name</th><th>Qty</th><th>Sell</th></tr></thead>
<tbody id="inv"></tbody>
</table>
</div>
</div>

<script>
let role="";
let products=JSON.parse(localStorage.getItem("products")||"[]");
let totalSales=+localStorage.getItem("sales")||0;
let totalProfit=+localStorage.getItem("profit")||0;

function login(){
 if(u.value==="anas" && p.value==="878080"){role="admin";start();}
 else if(u.value==="staff" && p.value==="112233"){role="staff";start();adminBox.style.display="none";}
 else alert("Login Failed");
}

function start(){
 loginBox.style.display="none";
 app.classList.remove("hidden");
 render();
}

function save(){
 localStorage.setItem("products",JSON.stringify(products));
 localStorage.setItem("sales",totalSales);
 localStorage.setItem("profit",totalProfit);
}

function saveRate(){
 localStorage.setItem("rate",rate.value);
 alert("Saved");
}

function addProduct(){
 products.push({
  name:name.value,buy:+buy.value,sell:+sell.value,qty:+qty.value
 });
 save(); render();
}

function sellProduct(){
 let p=products.find(x=>x.name===sellName.value);
 let q=+sellQty.value;
 if(!p || p.qty<q){alert("Stock Error");return;}
 p.qty-=q;
 totalSales+=p.sell*q;
 totalProfit+=(p.sell-p.buy)*q;

 let r=+localStorage.getItem("rate")||1450;
 let total=p.sell*q;
 let txt=(currency.value==="IQD")?
   (total*r).toLocaleString()+" IQD":
   "$"+total;

 receipt.innerHTML="<h4>Receipt</h4><p>"+p.name+" x "+q+"</p><p>Total: "+txt+"</p>";
 save(); render();
}

function render(){
 inv.innerHTML="";
 products.forEach(p=>{
  inv.innerHTML+=`<tr><td>${p.name}</td><td>${p.qty}</td><td>$${p.sell}</td></tr>`;
 });
 sales.innerText="Sales: $"+totalSales;
 profit.innerText="Profit: $"+totalProfit;
}
</script>
</body>
</html>
